<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HA! Healthcare - Login</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-header">
            <h2>🩺 HA! </h2>
            <p>Welcome. Please enter your details to continue.</p>
        </div>

        <div class="input-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Characters only (e.g. John Doe)">
        </div>

        <div class="input-group">
            <label for="phone">Mobile Number</label>
            <input type="text" id="phone" placeholder="Numbers only">
        </div>

        <div class="input-group">
            <label for="location">Location</label>
            <input type="text" id="location" placeholder="Characters only (e.g. New York)">
        </div>

        <button onclick="login()" class="login-btn" id="loginBtn">
            <span id="btn-text">Continue to Chat</span>
            <div class="spinner" id="loader"></div>
        </button>
        
        <div id="error-msg" class="error-msg"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
